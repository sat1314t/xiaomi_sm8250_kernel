name: Build Kernel liyafe1977
run-name: Build Kernel SukiSU KPM SUSFS (Lineage-clean, no MIUI overrides)
on:
  workflow_dispatch:
    inputs:
      roota:
        description: '是否需要ksu（不需要留空即可）'
        required: false
        type: string
      phonea:
        description: '输入机型代号（如小米10 umi）'
        required: false
        type: string
jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:

      - name: 1.拉取编译链
        run: |
          mkdir $GITHUB_WORKSPACE/proton-clang
          cd proton-clang
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt install build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3

      - name: 2.拉取并编译
        run: |
          mkdir $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://github.com/clcwpwqi/kernel_865_mod -b android15-lineage22-mod --depth=1 android_kernel
          cd android_kernel
          echo "=== Stripping MIUI overrides for LineageOS compatibility ==="
          sed -i '/STATIC_USERMODEHELPER_PATH/d' build-action.sh
          sed -i '/-e XIAOMI_MIUI/d' build-action.sh
          sed -i '/-e MIGT/d' build-action.sh
          sed -i '/-e MIHW/d' build-action.sh
          sed -i '/-e MILLET/d' build-action.sh
          sed -i '/-e MIUI_ZRAM_MEMORY_TRACKING/d' build-action.sh
          sed -i '/-e MI_FRAGMENTION/d' build-action.sh
          sed -i '/-e MI_RECLAIM/d' build-action.sh
          sed -i '/-e BOOTUP_RECLAIM/d' build-action.sh
          sed -i '/-e RTMM/d' build-action.sh
          sed -i '/-e PACKAGE_RUNTIME_INFO/d' build-action.sh
          sed -i '/-e PERF_HUMANTASK/d' build-action.sh
          echo "--- remaining MIUI refs in build-action.sh (expect none) ---"
          grep -nE "XIAOMI_MIUI|MIUI_ZRAM|micd|MILLET|MIGT" build-action.sh || true
          bash build-action.sh ${{ inputs.phonea }} ${{ inputs.roota}}

      - name: 3.上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-kernel-AnyKernel3
          path: kernel_workspace/android_kernel/anykernel/*
          retention-days: 3
